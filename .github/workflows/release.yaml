name: Build and Release Runner
run-name: Release Bitbucket Pipelines Runner version ${{ inputs.version }}

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

on:
  workflow_call:
    inputs:
      version:
        description: 'Runner Version to release'
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: 'Runner Version to release'
        required: true
        type: string
        default: 'latest'

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    permissions: write-all
    env:
      IMAGE_NAME: samjuk/bitbucket-pipelines-runner

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker Image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            BITBUCKET_RUNNER_VERSION=${{ inputs.version }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ inputs.version }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ inputs.version }}

  create-release:
    needs: build-docker-image
    runs-on: ubuntu-latest
    permissions: write-all
    env:
      IMAGE_NAME: samjuk/bitbucket-pipelines-runner
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: Release v${{ inputs.version }}
          tag_name: ${{ inputs.version }}
          generate_release_notes: false
          append_body: false
          body: |
            Release of Bitbucket Pipelines Runner version `${{ inputs.version }}`.

            ## New Docker Images
            - `${{ env.IMAGE_NAME }}:latest`
            - `${{ env.IMAGE_NAME }}:${{ inputs.version }}`
            - `ghcr.io/${{ env.IMAGE_NAME }}:latest`
            - `ghcr.io/${{ env.IMAGE_NAME }}:${{ inputs.version }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
